<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abuelo Julio — Portal de Pedidos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root{
      --bg:#0c0d0f;
      --bg2:#14161a;
      --panel:#1a1d21;
      --panel2:#21252a;
      --line:#30353d;
      --text:#f5f7fa;
      --text2:#aeb5be;
      --muted:#7a828d;
      --accent:#d8b07b;
      --accent2:#ebc992;
      --danger:#ff7d73;
      --danger-bg:rgba(255,125,115,.12);
      --success:#5ac88d;
      --success-bg:rgba(90,200,141,.12);
      --chip:#282d34;
      --preliminar:#f3c37d;
      --preliminar-bg:rgba(243,195,125,.16);
      --confirmado:#7bb3ff;
      --confirmado-bg:rgba(123,179,255,.14);
      --entregado:#6fd49f;
      --entregado-bg:rgba(111,212,159,.14);
    }

    html, body {
      min-height: 100%;
      background: linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.5;
    }

    .view { display:none; min-height:100vh; }
    .view.active { display:flex; }

    #view-login, #view-setpass {
      align-items:center;
      justify-content:center;
      padding:2rem;
      position:relative;
      overflow:hidden;
    }

    #view-login::before, #view-setpass::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 15% 15%, rgba(216,176,123,.12), transparent 30%),
        radial-gradient(circle at 85% 80%, rgba(255,255,255,.05), transparent 28%);
      pointer-events:none;
    }

    .auth-card{
      width:100%;
      max-width:450px;
      background:rgba(26,29,33,.96);
      border:1px solid rgba(216,176,123,.2);
      border-radius:22px;
      padding:2.3rem;
      box-shadow:0 30px 80px rgba(0,0,0,.38);
      position:relative;
      z-index:1;
      backdrop-filter: blur(8px);
    }

    .logo-wrap{
      text-align:center;
      margin-bottom:1.8rem;
    }

    .logo-wrap img{
      width:142px;
      height:142px;
      border-radius:50%;
      object-fit:cover;
      border:3px solid rgba(216,176,123,.58);
      box-shadow:0 12px 40px rgba(0,0,0,.3);
    }

    .logo-wrap h1{
      font-family:'Playfair Display', serif;
      font-size:2.1rem;
      font-weight:700;
      margin-top:1rem;
    }

    .logo-wrap p{
      color:var(--text2);
      font-size:.82rem;
      letter-spacing:.16em;
      text-transform:uppercase;
      margin-top:.32rem;
    }

    .divider{
      height:1px;
      background:linear-gradient(90deg, transparent, rgba(216,176,123,.35), transparent);
      margin:1.4rem 0;
    }

    .form-group{ margin-bottom:1rem; }
    .form-group label{
      display:block;
      font-size:.78rem;
      text-transform:uppercase;
      letter-spacing:.12em;
      color:var(--text2);
      margin-bottom:.45rem;
    }

    .form-group input, .form-group select, .form-group textarea{
      width:100%;
      border:1px solid var(--line);
      background:#13161a;
      color:var(--text);
      border-radius:12px;
      padding:.9rem .95rem;
      font-size:.96rem;
      outline:none;
      transition:.2s;
      font-family:'Inter', sans-serif;
    }

    .form-group textarea{ resize:vertical; min-height:84px; }

    .form-group input:focus, .form-group select:focus, .form-group textarea:focus{
      border-color:rgba(216,176,123,.6);
      box-shadow:0 0 0 4px rgba(216,176,123,.12);
    }

    .btn-primary, .btn-secondary, .btn-ghost, .btn-danger{
      border:none;
      border-radius:12px;
      cursor:pointer;
      font-family:'Inter', sans-serif;
      font-weight:700;
      transition:.2s;
    }

    .btn-primary{
      background:linear-gradient(180deg, var(--accent2), var(--accent));
      color:#1a1410;
      padding:.95rem 1rem;
    }

    .btn-primary.full{ width:100%; margin-top:.35rem; }

    .btn-secondary{
      background:#323842;
      color:#fff;
      padding:.82rem 1rem;
    }

    .btn-ghost{
      background:transparent;
      color:var(--text2);
      border:1px solid var(--line);
      padding:.82rem 1rem;
    }

    .btn-danger{
      background:var(--danger-bg);
      color:#ffd8d4;
      border:1px solid rgba(255,125,115,.28);
      padding:.82rem 1rem;
    }

    .btn-primary:hover, .btn-secondary:hover, .btn-ghost:hover, .btn-danger:hover{
      transform:translateY(-1px);
    }

    .btn-primary:disabled, .btn-secondary:disabled, .btn-ghost:disabled, .btn-danger:disabled{
      opacity:.6;
      cursor:not-allowed;
      transform:none;
    }

    .msg{
      margin-top:1rem;
      padding:.85rem 1rem;
      border-radius:12px;
      font-size:.92rem;
      display:none;
    }

    .msg.error{
      display:block;
      background:var(--danger-bg);
      color:var(--danger);
      border:1px solid rgba(255,125,115,.24);
    }

    .msg.success{
      display:block;
      background:var(--success-bg);
      color:var(--success);
      border:1px solid rgba(90,200,141,.24);
    }

    #view-pedidos{ flex-direction:column; }

    .top-bar{
      height:82px;
      border-bottom:1px solid var(--line);
      background:rgba(10,12,14,.88);
      backdrop-filter: blur(9px);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 1.4rem 0 1.2rem;
      position:sticky;
      top:0;
      z-index:30;
    }

    .top-brand{
      display:flex;
      align-items:center;
      gap:1rem;
    }

    .top-brand img{
      width:58px;
      height:58px;
      border-radius:50%;
      object-fit:cover;
      border:2px solid rgba(216,176,123,.48);
    }

    .top-brand .brand-text{
      display:flex;
      flex-direction:column;
      line-height:1.06;
    }

    .top-brand strong{
      font-family:'Playfair Display', serif;
      font-size:1.52rem;
    }

    .top-brand span{
      color:var(--text2);
      font-size:.8rem;
      letter-spacing:.1em;
      text-transform:uppercase;
    }

    .top-right{
      display:flex;
      align-items:center;
      gap:.8rem;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .user-pill{
      color:var(--text2);
      font-size:.84rem;
      padding:.58rem .78rem;
      border:1px solid var(--line);
      border-radius:999px;
      background:rgba(255,255,255,.02);
    }

    .app-shell{
      display:grid;
      grid-template-columns:300px 1fr;
      min-height:calc(100vh - 82px);
    }

    .sidebar{
      border-right:1px solid var(--line);
      background:rgba(16,18,21,.96);
      padding:1.35rem;
      position:sticky;
      top:82px;
      height:calc(100vh - 82px);
      overflow:auto;
    }

    .sidebar-card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;
      padding:1rem;
      margin-bottom:1rem;
    }

    .sidebar-card h3{
      font-size:.92rem;
      color:var(--text);
      margin-bottom:.9rem;
      letter-spacing:.04em;
    }

    .sidebar-actions{
      display:flex;
      flex-direction:column;
      gap:.7rem;
    }

    .main{ padding:1.5rem; }

    .page-head{
      display:flex;
      flex-direction:column;
      gap:1rem;
      margin-bottom:1.2rem;
    }

    .page-head-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:1rem;
      flex-wrap:wrap;
    }

    .page-head h2{
      font-family:'Playfair Display', serif;
      font-size:2rem;
      font-weight:700;
    }

    .page-head p{
      color:var(--text2);
      margin-top:.35rem;
    }

    .summary-grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(140px, 1fr));
      gap:.85rem;
    }

    .summary-card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;
      padding:1rem;
    }

    .summary-card .label{
      color:var(--text2);
      font-size:.78rem;
      text-transform:uppercase;
      letter-spacing:.12em;
    }

    .summary-card .value{
      font-size:1.6rem;
      font-weight:800;
      margin-top:.25rem;
    }

    .groups{
      display:flex;
      flex-direction:column;
      gap:1.2rem;
    }

    .status-group{
      background:rgba(255,255,255,.02);
      border:1px solid var(--line);
      border-radius:20px;
      overflow:hidden;
    }

    .status-head{
      padding:1rem 1.2rem;
      border-bottom:1px solid var(--line);
      background:rgba(255,255,255,.02);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:1rem;
    }

    .status-head h3{
      font-size:.95rem;
      letter-spacing:.06em;
      text-transform:uppercase;
    }

    .status-head.preliminar h3{ color:var(--preliminar); }
    .status-head.confirmado h3{ color:var(--confirmado); }
    .status-head.entregado h3{ color:var(--entregado); }

    .status-count{
      background:var(--chip);
      border:1px solid var(--line);
      padding:.35rem .7rem;
      border-radius:999px;
      color:var(--text2);
      font-size:.8rem;
    }

    .pedido-card{
      margin:1rem;
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden;
      background:var(--panel);
    }

    .pedido-card.preliminar{
      border-color:rgba(243,195,125,.34);
      box-shadow:0 0 0 1px rgba(243,195,125,.08) inset;
    }

    .pedido-head{
      padding:1rem 1.1rem;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:1rem;
      cursor:pointer;
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
    }

    .pedido-head-left{
      display:flex;
      flex-direction:column;
      gap:.35rem;
    }

    .pedido-num{
      font-family:'Playfair Display', serif;
      font-size:1.26rem;
      font-weight:700;
    }

    .pedido-date{
      color:var(--text2);
      font-size:.9rem;
    }

    .pedido-head-right{
      display:flex;
      gap:.6rem;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .chip{
      padding:.35rem .68rem;
      border-radius:999px;
      font-size:.78rem;
      border:1px solid var(--line);
      background:var(--chip);
      color:var(--text2);
    }

    .chip.preliminar{
      color:var(--preliminar);
      background:var(--preliminar-bg);
      border-color:rgba(243,195,125,.25);
      font-weight:700;
    }

    .chip.confirmado{
      color:var(--confirmado);
      background:var(--confirmado-bg);
      border-color:rgba(123,179,255,.25);
    }

    .chip.entregado{
      color:var(--entregado);
      background:var(--entregado-bg);
      border-color:rgba(111,212,159,.25);
    }

    .pedido-body{
      display:none;
      border-top:1px solid var(--line);
      padding:.9rem 1rem 1rem;
    }

    .pedido-card.open .pedido-body{ display:block; }

    table{
      width:100%;
      border-collapse:collapse;
      overflow:hidden;
    }

    th, td{
      padding:.82rem .75rem;
      border-bottom:1px solid rgba(255,255,255,.06);
      text-align:left;
    }

    th{
      color:var(--text2);
      font-size:.76rem;
      text-transform:uppercase;
      letter-spacing:.12em;
    }

    td{
      font-size:.94rem;
      color:var(--text);
    }

    .qty{
      font-weight:800;
      color:var(--accent2);
    }

    .pedido-actions{
      display:flex;
      justify-content:flex-end;
      gap:.7rem;
      margin-top:.95rem;
      flex-wrap:wrap;
    }

    .loading, .empty{
      padding:2rem;
      text-align:center;
      color:var(--text2);
      border:1px dashed var(--line);
      border-radius:18px;
      background:rgba(255,255,255,.02);
    }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.62);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:60;
      padding:1rem;
    }

    .modal.active{ display:flex; }

    .modal-card{
      width:100%;
      max-width:940px;
      max-height:92vh;
      overflow:auto;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:0 30px 80px rgba(0,0,0,.45);
    }

    .modal-head{
      padding:1.2rem 1.2rem .9rem;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:1rem;
    }

    .modal-head h3{
      font-family:'Playfair Display', serif;
      font-size:1.6rem;
    }

    .modal-body{ padding:1.2rem; }

    .modal-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(220px, 1fr));
      gap:.9rem;
      margin-bottom:1rem;
    }

    .line-item{
      display:grid;
      grid-template-columns:1.7fr .7fr .8fr auto;
      gap:.8rem;
      align-items:end;
      margin-bottom:.9rem;
      padding:.9rem;
      border:1px solid var(--line);
      border-radius:16px;
      background:var(--panel2);
    }

    .modal-actions{
      display:flex;
      justify-content:space-between;
      gap:.8rem;
      padding:1rem 1.2rem 1.2rem;
      border-top:1px solid var(--line);
      flex-wrap:wrap;
    }

    @media (max-width: 1040px){
      .app-shell{ grid-template-columns:1fr; }
      .sidebar{
        position:static;
        height:auto;
        border-right:none;
        border-bottom:1px solid var(--line);
      }
      .summary-grid{ grid-template-columns:repeat(2, minmax(140px, 1fr)); }
    }

    @media (max-width: 760px){
      .top-bar{
        height:auto;
        padding:1rem;
        align-items:flex-start;
        gap:1rem;
        flex-direction:column;
      }
      .top-right{ width:100%; justify-content:flex-start; }
      .main{ padding:1rem; }
      .page-head-top{ flex-direction:column; }
      .line-item, .modal-grid{
        grid-template-columns:1fr;
      }
      .pedido-head{
        flex-direction:column;
        align-items:flex-start;
      }
      .pedido-head-right{
        justify-content:flex-start;
      }
      .summary-grid{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

<div id="view-login" class="view active">
  <div class="auth-card">
    <div class="logo-wrap">
      <img src="https://raw.githubusercontent.com/OMAXING/AbueloJulio/main/Abuelo%20Julio.jpeg" alt="Abuelo Julio" onerror="this.style.display='none'" />
      <h1>Abuelo Julio</h1>
      <p>Portal de Pedidos</p>
    </div>
    <div class="divider"></div>
    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" id="login-mail" placeholder="tu@correo.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn-primary full" id="btn-login">Ingresar</button>
    <div class="msg" id="login-msg"></div>
  </div>
</div>

<div id="view-setpass" class="view">
  <div class="auth-card">
    <div class="logo-wrap">
      <img src="https://raw.githubusercontent.com/OMAXING/AbueloJulio/main/Abuelo%20Julio.jpeg" alt="Abuelo Julio" onerror="this.style.display='none'" />
      <h1>Abuelo Julio</h1>
      <p>Crear contraseña</p>
    </div>
    <div class="divider"></div>
    <p style="color:var(--text2); margin-bottom:1.2rem; text-align:center;">
      Es tu primer ingreso. Creá una contraseña para tu cuenta.
    </p>
    <div class="form-group">
      <label>Nueva contraseña</label>
      <input type="password" id="setpass-new" placeholder="Mínimo 6 caracteres" />
    </div>
    <div class="form-group">
      <label>Confirmá la contraseña</label>
      <input type="password" id="setpass-confirm" placeholder="Repetí tu contraseña" />
    </div>
    <button class="btn-primary full" id="btn-setpass">Guardar contraseña</button>
    <div class="msg" id="setpass-msg"></div>
  </div>
</div>

<div id="view-pedidos" class="view">
  <header class="top-bar">
    <div class="top-brand">
      <img src="https://raw.githubusercontent.com/OMAXING/AbueloJulio/main/Abuelo%20Julio.jpeg" alt="Abuelo Julio" onerror="this.style.display='none'" />
      <div class="brand-text">
        <strong>Abuelo Julio</strong>
        <span>Portal de Pedidos</span>
      </div>
    </div>
    <div class="top-right">
      <div class="user-pill" id="user-label"></div>
      <button class="btn-secondary" id="btn-new-pedido">+ Crear pedido</button>
      <button class="btn-ghost" id="btn-logout">Salir</button>
    </div>
  </header>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-card">
        <h3>Filtros</h3>

        <div class="form-group">
          <label>Fecha desde</label>
          <input type="date" id="filter-fecha-desde" />
        </div>

        <div class="form-group">
          <label>Fecha hasta</label>
          <input type="date" id="filter-fecha-hasta" />
        </div>

        <div class="form-group">
          <label>Corte</label>
          <select id="filter-corte">
            <option value="">Todos los cortes</option>
          </select>
        </div>

        <div class="form-group">
          <label>Estado</label>
          <select id="filter-estado">
            <option value="">Todos los estados</option>
          </select>
        </div>

        <div class="sidebar-actions">
          <button class="btn-ghost" id="btn-clear-filters">Limpiar filtros</button>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="page-head">
        <div class="page-head-top">
          <div>
            <h2>Mis Pedidos</h2>
            <p id="pedidos-subtitle">Cargando pedidos...</p>
          </div>
        </div>

        <div class="summary-grid">
          <div class="summary-card">
            <div class="label">Total</div>
            <div class="value" id="sum-total">0</div>
          </div>
          <div class="summary-card">
            <div class="label">Preliminares</div>
            <div class="value" id="sum-preliminar">0</div>
          </div>
          <div class="summary-card">
            <div class="label">Confirmados</div>
            <div class="value" id="sum-confirmado">0</div>
          </div>
          <div class="summary-card">
            <div class="label">Entregados</div>
            <div class="value" id="sum-entregado">0</div>
          </div>
        </div>
      </div>

      <div id="pedidos-list">
        <div class="loading">Cargando pedidos...</div>
      </div>
    </main>
  </div>
</div>

<div class="modal" id="pedido-modal">
  <div class="modal-card">
    <div class="modal-head">
      <h3 id="pedido-modal-title">Nuevo Pedido</h3>
      <button class="btn-ghost" id="btn-close-modal">Cerrar</button>
    </div>
    <div class="modal-body">
      <div id="pedido-modal-msg" class="msg"></div>

      <div class="modal-grid">
        <div class="form-group">
          <label>Fecha del pedido</label>
          <input type="date" id="pedido-fecha" />
        </div>
      </div>

      <div id="line-items-wrap"></div>
      <button class="btn-secondary" id="btn-add-line">+ Agregar corte</button>
    </div>
    <div class="modal-actions">
      <button class="btn-danger" id="btn-cancel-modal">Cancelar</button>
      <button class="btn-primary" id="btn-save-pedido">Guardar pedido</button>
    </div>
  </div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycby0T0NJYDh62JpPnnHuAAXXWl9wm-h3KobwpJnx4jShDLmD7EIv5FsZ5WIb2HcCMbNv/exec";

  let currentMail = "";
  let currentClienteId = "";
  let allowedProductos = [];
  let pedidosCache = [];
  let editingPedidoId = "";
  let savingPedido = false;

  function showView(id){
    document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  function showMsg(elId, text, type){
    const el = document.getElementById(elId);
    el.textContent = text;
    el.className = "msg " + type;
  }

  function clearMsg(elId){
    const el = document.getElementById(elId);
    el.textContent = "";
    el.className = "msg";
  }

  async function api(payload){
    const params = new URLSearchParams({ data: JSON.stringify(payload) });
    const res = await fetch(API_URL + "?" + params.toString(), {
      method: "GET",
      redirect: "follow"
    });
    return res.json();
  }

  function escHtml(str){
    return String(str || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function saveSession(){
    localStorage.setItem("abueloJulioSession", JSON.stringify({
      mail: currentMail,
      clienteId: currentClienteId
    }));
  }

  function clearSession(){
    localStorage.removeItem("abueloJulioSession");
  }

  function restoreSession(){
    try{
      const raw = localStorage.getItem("abueloJulioSession");
      if (!raw) return false;
      const s = JSON.parse(raw);
      if (!s || !s.mail || !s.clienteId) return false;

      currentMail = s.mail;
      currentClienteId = s.clienteId;
      enterPedidos();
      return true;
    } catch(e){
      return false;
    }
  }

  function showModal(){
    document.getElementById("pedido-modal").classList.add("active");
  }

  function hideModal(){
    document.getElementById("pedido-modal").classList.remove("active");
    clearMsg("pedido-modal-msg");
    document.getElementById("line-items-wrap").innerHTML = "";
    document.getElementById("pedido-fecha").value = "";
    editingPedidoId = "";
    savingPedido = false;
    const btn = document.getElementById("btn-save-pedido");
    btn.disabled = false;
    btn.textContent = "Guardar pedido";
  }

  function getProductoOptionsHtml(selectedId = ""){
    return `
      <option value="">Seleccionar corte</option>
      ${allowedProductos.map(p => `
        <option value="${escHtml(p.productoId)}" ${String(selectedId) === String(p.productoId) ? "selected" : ""}>
          ${escHtml(p.productoNombre)}
        </option>
      `).join("")}
    `;
  }

  function addLineItemRow(item = {}){
    const wrap = document.getElementById("line-items-wrap");
    const div = document.createElement("div");
    div.className = "line-item";
    div.innerHTML = `
      <div class="form-group" style="margin-bottom:0;">
        <label>Corte</label>
        <select class="item-producto">
          ${getProductoOptionsHtml(item.productoId || "")}
        </select>
      </div>

      <div class="form-group" style="margin-bottom:0;">
        <label>Cantidad</label>
        <input type="number" class="item-cantidad" min="0.01" step="0.01" value="${item.cantidad || ""}" placeholder="0" />
      </div>

      <div class="form-group" style="margin-bottom:0;">
        <label>Unidad</label>
        <select class="item-unidad">
          <option value="Kg" ${item.unidad === "Kg" ? "selected" : ""}>Kg</option>
          <option value="Unidades" ${item.unidad === "Unidades" ? "selected" : ""}>Unidades</option>
          <option value="Cajas" ${item.unidad === "Cajas" ? "selected" : ""}>Cajas</option>
        </select>
      </div>

      <div>
        <button type="button" class="btn-danger btn-remove-line">Eliminar</button>
      </div>
    `;
    wrap.appendChild(div);

    div.querySelector(".btn-remove-line").addEventListener("click", () => {
      div.remove();
    });
  }

  function collectLineItems(){
    const rows = [...document.querySelectorAll(".line-item")];
    return rows.map(row => ({
      productoId: row.querySelector(".item-producto").value,
      cantidad: row.querySelector(".item-cantidad").value,
      unidad: row.querySelector(".item-unidad").value
    }));
  }

  async function loadAllowedProductos(){
    const data = await api({
      action: "getAllowedProductos",
      clienteId: currentClienteId
    });

    if (!data.success){
      allowedProductos = [];
      return;
    }

    allowedProductos = data.productos || [];

    document.getElementById("filter-corte").innerHTML =
      `<option value="">Todos los cortes</option>` +
      allowedProductos.map(p => `<option value="${escHtml(p.productoId)}">${escHtml(p.productoNombre)}</option>`).join("");
  }

  function getStatusClass(status){
    const s = String(status || "").toLowerCase();
    if (s === "preliminar") return "preliminar";
    if (s === "confirmado") return "confirmado";
    if (s === "entregado") return "entregado";
    return "";
  }

  async function loadPedidos(){
    const listEl = document.getElementById("pedidos-list");
    listEl.innerHTML = `<div class="loading">Cargando pedidos...</div>`;
    document.getElementById("pedidos-subtitle").textContent = "Cargando pedidos...";

    const fechaDesde = document.getElementById("filter-fecha-desde").value;
    const fechaHasta = document.getElementById("filter-fecha-hasta").value;
    const corteId = document.getElementById("filter-corte").value;
    const estado = document.getElementById("filter-estado").value;

    try{
      const data = await api({
        action: "getPedidos",
        clienteId: currentClienteId,
        fechaDesde,
        fechaHasta,
        corteId,
        estado
      });

      if (!data.success){
        listEl.innerHTML = `<div class="empty">Error al cargar pedidos.</div>`;
        return;
      }

      const grupos = data.grupos || [];
      const resumen = data.resumen || { total:0, preliminar:0, confirmado:0, entregado:0 };
      pedidosCache = grupos.flatMap(g => g.pedidos);

      document.getElementById("sum-total").textContent = resumen.total || 0;
      document.getElementById("sum-preliminar").textContent = resumen.preliminar || 0;
      document.getElementById("sum-confirmado").textContent = resumen.confirmado || 0;
      document.getElementById("sum-entregado").textContent = resumen.entregado || 0;

      updateEstadoFilter(data.estadosDisponibles || []);

      document.getElementById("pedidos-subtitle").textContent =
        (resumen.total || 0) === 0 ? "No hay pedidos para los filtros seleccionados." :
        (resumen.total || 0) === 1 ? "1 pedido encontrado" :
        `${resumen.total} pedidos encontrados`;

      if (!grupos.length){
        listEl.innerHTML = `<div class="empty">No hay pedidos para los filtros seleccionados.</div>`;
        return;
      }

      listEl.innerHTML = `
        <div class="groups">
          ${grupos.map((grupo, gi) => `
            <section class="status-group">
              <div class="status-head ${getStatusClass(grupo.status)}">
                <h3>${escHtml(grupo.status)}</h3>
                <span class="status-count">${grupo.pedidos.length} ${grupo.pedidos.length === 1 ? "pedido" : "pedidos"}</span>
              </div>

              ${grupo.pedidos.map((p, pi) => `
                <article class="pedido-card ${getStatusClass(p.pedidoStatus)}" id="pedido-${gi}-${pi}">
                  <div class="pedido-head" onclick="togglePedido('${gi}-${pi}')">
                    <div class="pedido-head-left">
                      <div class="pedido-num">Pedido #${escHtml(p.pedidoNumero)}</div>
                      <div class="pedido-date">
                        ${p.fechaEntrega ? `Entrega: ${escHtml(p.fechaEntrega)}` : "Sin fecha de entrega"}
                      </div>
                    </div>

                    <div class="pedido-head-right">
                      <span class="chip ${getStatusClass(p.pedidoStatus)}">${escHtml(p.pedidoStatus)}</span>
                      <span class="chip">${p.items.length} ${p.items.length === 1 ? "item" : "items"}</span>
                      ${p.editable ? `<span class="chip preliminar">Editable</span>` : ``}
                    </div>
                  </div>

                  <div class="pedido-body">
                    <table>
                      <thead>
                        <tr>
                          <th>Producto</th>
                          <th>Cantidad</th>
                          <th>Unidad</th>
                        </tr>
                      </thead>
                      <tbody>
                        ${p.items.map(item => `
                          <tr>
                            <td>${escHtml(item.producto)}</td>
                            <td class="qty">${escHtml(String(item.cantidad))}</td>
                            <td>${escHtml(item.unidad)}</td>
                          </tr>
                        `).join("")}
                      </tbody>
                    </table>

                    <div class="pedido-actions">
                      <button class="btn-ghost" onclick="event.stopPropagation(); duplicatePedido('${escHtml(p.pedidoId)}')">Duplicar</button>

                      ${p.editable ? `
                        <button class="btn-secondary" onclick="event.stopPropagation(); openEditPedido('${escHtml(p.pedidoId)}')">Editar</button>
                        <button class="btn-danger" onclick="event.stopPropagation(); deletePedido('${escHtml(p.pedidoId)}')">Eliminar</button>
                      ` : ``}
                    </div>
                  </div>
                </article>
              `).join("")}
            </section>
          `).join("")}
        </div>
      `;

      const first = document.querySelector(".pedido-card");
      if (first) first.classList.add("open");

    } catch(err){
      console.error(err);
      listEl.innerHTML = `<div class="empty">Error de conexión. Intentá de nuevo.</div>`;
    }
  }

  function updateEstadoFilter(estados){
    const select = document.getElementById("filter-estado");
    const current = select.value;

    const html = `<option value="">Todos los estados</option>` +
      estados.map(e => `<option value="${escHtml(e)}">${escHtml(e)}</option>`).join("");

    select.innerHTML = html;

    if ([...select.options].some(o => o.value === current)) {
      select.value = current;
    }
  }

  function togglePedido(id){
    document.getElementById("pedido-" + id).classList.toggle("open");
  }

  function setTodayInModal(){
    const today = new Date();
    const y = today.getFullYear();
    const m = String(today.getMonth() + 1).padStart(2, "0");
    const d = String(today.getDate()).padStart(2, "0");
    document.getElementById("pedido-fecha").value = `${y}-${m}-${d}`;
  }

  function openNewPedido(){
    editingPedidoId = "";
    document.getElementById("pedido-modal-title").textContent = "Nuevo Pedido";
    document.getElementById("line-items-wrap").innerHTML = "";
    setTodayInModal();
    addLineItemRow();
    showModal();
  }

  function openEditPedido(pedidoId){
    const pedido = pedidosCache.find(p => String(p.pedidoId) === String(pedidoId));
    if (!pedido) return;

    editingPedidoId = pedidoId;
    document.getElementById("pedido-modal-title").textContent = "Editar Pedido #" + pedido.pedidoNumero;
    document.getElementById("line-items-wrap").innerHTML = "";
    document.getElementById("pedido-fecha").value = pedido.fechaPedidoInput || "";

    if (pedido.items && pedido.items.length){
      pedido.items.forEach(item => {
        addLineItemRow({
          productoId: item.productoId,
          cantidad: item.cantidad,
          unidad: item.unidad
        });
      });
    } else {
      addLineItemRow();
    }

    showModal();
  }

  function duplicatePedido(pedidoId){
    const pedido = pedidosCache.find(p => String(p.pedidoId) === String(pedidoId));
    if (!pedido) return;

    editingPedidoId = "";
    document.getElementById("pedido-modal-title").textContent = "Duplicar Pedido #" + pedido.pedidoNumero;
    document.getElementById("line-items-wrap").innerHTML = "";
    setTodayInModal();

    (pedido.items || []).forEach(item => {
      addLineItemRow({
        productoId: item.productoId,
        cantidad: item.cantidad,
        unidad: item.unidad
      });
    });

    if (!pedido.items || !pedido.items.length) addLineItemRow();

    showModal();
  }

  async function savePedido(){
    if (savingPedido) return;
    clearMsg("pedido-modal-msg");

    const items = collectLineItems();
    const pedidoFecha = document.getElementById("pedido-fecha").value;

    if (!pedidoFecha){
      showMsg("pedido-modal-msg", "Seleccioná una fecha para el pedido.", "error");
      return;
    }

    if (!items.length){
      showMsg("pedido-modal-msg", "Agregá al menos un corte.", "error");
      return;
    }

    for (const item of items){
      if (!item.productoId){
        showMsg("pedido-modal-msg", "Todos los items deben tener un corte seleccionado.", "error");
        return;
      }
      if (!item.cantidad || Number(item.cantidad) <= 0){
        showMsg("pedido-modal-msg", "Todas las cantidades deben ser mayores a 0.", "error");
        return;
      }
    }

    savingPedido = true;
    const btn = document.getElementById("btn-save-pedido");
    btn.disabled = true;
    btn.textContent = "Guardando...";

    try{
      const payload = editingPedidoId
        ? {
            action: "updatePedido",
            pedidoId: editingPedidoId,
            clienteId: currentClienteId,
            mail: currentMail,
            pedidoFecha,
            items
          }
        : {
            action: "createPedido",
            clienteId: currentClienteId,
            mail: currentMail,
            pedidoFecha,
            items
          };

      const data = await api(payload);

      if (!data.success){
        showMsg("pedido-modal-msg", data.error || "No se pudo guardar el pedido.", "error");
        savingPedido = false;
        btn.disabled = false;
        btn.textContent = "Guardar pedido";
        return;
      }

      hideModal();
      await loadPedidos();

    } catch(err){
      console.error(err);
      showMsg("pedido-modal-msg", "Error de conexión al guardar.", "error");
      savingPedido = false;
      btn.disabled = false;
      btn.textContent = "Guardar pedido";
    }
  }

  async function deletePedido(pedidoId){
    const pedido = pedidosCache.find(p => String(p.pedidoId) === String(pedidoId));
    if (!pedido) return;

    const ok = confirm(`¿Querés eliminar el pedido #${pedido.pedidoNumero}?`);
    if (!ok) return;

    try{
      const data = await api({
        action: "deletePedido",
        pedidoId
      });

      if (!data.success){
        alert(data.error || "No se pudo eliminar el pedido.");
        return;
      }

      await loadPedidos();
    } catch(err){
      console.error(err);
      alert("Error de conexión al eliminar.");
    }
  }

  async function enterPedidos(){
    document.getElementById("user-label").textContent = currentMail;
    showView("view-pedidos");
    saveSession();
    await loadAllowedProductos();
    await loadPedidos();
  }

  document.getElementById("btn-login").addEventListener("click", async () => {
    clearMsg("login-msg");

    const mail = document.getElementById("login-mail").value.trim();
    const pass = document.getElementById("login-pass").value.trim();

    if (!mail){
      showMsg("login-msg", "Ingresá tu correo electrónico.", "error");
      return;
    }

    const btn = document.getElementById("btn-login");
    btn.disabled = true;
    btn.textContent = "Verificando...";

    try{
      const data = await api({ action:"login", mail, pass });

      if (!data.success){
        showMsg("login-msg", data.error || "Error al ingresar.", "error");
        return;
      }

      currentMail = data.mail;
      currentClienteId = data.clienteId;

      if (data.status === "no_password"){
        showView("view-setpass");
      } else {
        await enterPedidos();
      }

    } catch(err){
      console.error(err);
      showMsg("login-msg", "Error de conexión. Intentá de nuevo.", "error");
    } finally {
      btn.disabled = false;
      btn.textContent = "Ingresar";
    }
  });

  ["login-mail","login-pass"].forEach(id => {
    document.getElementById(id).addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("btn-login").click();
    });
  });

  document.getElementById("btn-setpass").addEventListener("click", async () => {
    clearMsg("setpass-msg");

    const newPass = document.getElementById("setpass-new").value.trim();
    const confirmPass = document.getElementById("setpass-confirm").value.trim();

    if (!newPass || newPass.length < 6){
      showMsg("setpass-msg", "La contraseña debe tener al menos 6 caracteres.", "error");
      return;
    }

    if (newPass !== confirmPass){
      showMsg("setpass-msg", "Las contraseñas no coinciden.", "error");
      return;
    }

    const btn = document.getElementById("btn-setpass");
    btn.disabled = true;
    btn.textContent = "Guardando...";

    try{
      const data = await api({
        action: "setPassword",
        mail: currentMail,
        pass: newPass
      });

      if (!data.success){
        showMsg("setpass-msg", data.error || "Error al guardar.", "error");
        return;
      }

      showMsg("setpass-msg", "Contraseña creada correctamente.", "success");
      setTimeout(() => enterPedidos(), 700);

    } catch(err){
      console.error(err);
      showMsg("setpass-msg", "Error de conexión.", "error");
    } finally {
      btn.disabled = false;
      btn.textContent = "Guardar contraseña";
    }
  });

  document.getElementById("filter-fecha-desde").addEventListener("change", loadPedidos);
  document.getElementById("filter-fecha-hasta").addEventListener("change", loadPedidos);
  document.getElementById("filter-corte").addEventListener("change", loadPedidos);
  document.getElementById("filter-estado").addEventListener("change", loadPedidos);

  document.getElementById("btn-clear-filters").addEventListener("click", () => {
    document.getElementById("filter-fecha-desde").value = "";
    document.getElementById("filter-fecha-hasta").value = "";
    document.getElementById("filter-corte").value = "";
    document.getElementById("filter-estado").value = "";
    loadPedidos();
  });

  document.getElementById("btn-new-pedido").addEventListener("click", openNewPedido);
  document.getElementById("btn-close-modal").addEventListener("click", hideModal);
  document.getElementById("btn-cancel-modal").addEventListener("click", hideModal);
  document.getElementById("btn-add-line").addEventListener("click", () => addLineItemRow());
  document.getElementById("btn-save-pedido").addEventListener("click", savePedido);

  document.getElementById("btn-logout").addEventListener("click", () => {
    currentMail = "";
    currentClienteId = "";
    allowedProductos = [];
    pedidosCache = [];
    editingPedidoId = "";
    savingPedido = false;

    document.getElementById("login-mail").value = "";
    document.getElementById("login-pass").value = "";
    document.getElementById("pedidos-list").innerHTML = "";
    document.getElementById("filter-fecha-desde").value = "";
    document.getElementById("filter-fecha-hasta").value = "";
    document.getElementById("filter-corte").innerHTML = `<option value="">Todos los cortes</option>`;
    document.getElementById("filter-estado").innerHTML = `<option value="">Todos los estados</option>`;
    hideModal();
    clearMsg("login-msg");
    clearSession();
    showView("view-login");
  });

  restoreSession();
</script>
</body>
</html>
